<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风洞测试模拟器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #canvas-container {
            flex: 1;
            position: relative;
        }
        #controls {
            background-color: #333;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        #start-btn {
            background-color: #4CAF50;
            color: white;
        }
        #stop-btn {
            background-color: #f44336;
            color: white;
        }
        #model-select {
            padding: 8px;
            border-radius: 4px;
        }
        #file-input {
            color: white;
        }
        #color-scale {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-bar {
            width: 20px;
            height: 20px;
            border-radius: 2px;
        }
        #speed-info {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container"></div>
        <div id="controls">
            <div class="control-group">
                <label for="model-select">内置模型:</label>
                <select id="model-select">
                    <option value="none">选择模型</option>
                    <option value="car1">轿车</option>
                    <option value="car2">跑车</option>
                    <option value="car3">SUV</option>
                </select>
            </div>
            <div class="control-group">
                <label for="file-input">上传OBJ模型:</label>
                <input type="file" id="file-input" accept=".obj">
            </div>
            <div class="control-group">
                <button id="start-btn">开始风洞测试</button>
                <button id="stop-btn">停止风洞测试</button>
            </div>
            <div id="color-scale">
                <div class="color-bar" style="background: blue;"></div>
                <span>慢</span>
                <div class="color-bar" style="background: green;"></div>
                <div class="color-bar" style="background: yellow;"></div>
                <div class="color-bar" style="background: orange;"></div>
                <div class="color-bar" style="background: red;"></div>
                <span>快</span>
            </div>
            <div id="speed-info">
                风速: 0 m/s
            </div>
        </div>
    </div>
    
    <!-- Three.js库 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/MTLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // 全局变量
        let scene, camera, renderer, controls;
        let model, windParticles;
        let windActive = false;
        let windSpeed = 0;
        let windDirection = new THREE.Vector3(1, 0, 0);
        
        // 初始化场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 2, 5);
            
            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight - 80);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // 添加轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            // 添加光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 5);
            scene.add(directionalLight);
            
            // 创建风洞边界
            createWindTunnel();
            
            // 创建粒子系统
            createWindParticles();
            
            // 处理窗口大小变化
            window.addEventListener('resize', onWindowResize);
            
            // 开始动画循环
            animate();
        }
        
        // 创建风洞边界
        function createWindTunnel() {
            const tunnelGeometry = new THREE.BoxGeometry(20, 5, 5);
            const tunnelMaterial = new THREE.MeshBasicMaterial({
                color: 0x333333,
                transparent: true,
                opacity: 0.2,
                side: THREE.BackSide
            });
            const tunnel = new THREE.Mesh(tunnelGeometry, tunnelMaterial);
            tunnel.position.set(0, 0, 0);
            scene.add(tunnel);
        }
        
        // 创建粒子系统
        function createWindParticles() {
            const particleCount = 10000;
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesPosition = new Float32Array(particleCount * 3);
            const particlesColor = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                // 初始化粒子位置
                particlesPosition[i] = -10 + Math.random() * 20; // x
                particlesPosition[i + 1] = -2.5 + Math.random() * 5; // y
                particlesPosition[i + 2] = -2.5 + Math.random() * 5; // z
                
                // 初始颜色为蓝色（慢）
                particlesColor[i] = 0.0;
                particlesColor[i + 1] = 0.0;
                particlesColor[i + 2] = 1.0;
            }
            
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlesPosition, 3));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(particlesColor, 3));
            
            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });
            
            windParticles = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(windParticles);
        }
        
        // 加载内置模型
        function loadBuiltInModel(modelType) {
            // 移除旧模型
            if (model) {
                scene.remove(model);
            }
            
            // 创建简单的车辆模型
            model = new THREE.Group();
            
            switch (modelType) {
                case 'car1': // 轿车
                    // 车身
                    const carBodyGeometry = new THREE.BoxGeometry(2, 0.5, 1);
                    const carBodyMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
                    const carBody = new THREE.Mesh(carBodyGeometry, carBodyMaterial);
                    carBody.position.set(0, 0.25, 0);
                    model.add(carBody);
                    
                    // 车顶
                    const roofGeometry = new THREE.BoxGeometry(1.5, 0.4, 0.9);
                    const roofMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000 });
                    const roof = new THREE.Mesh(roofGeometry, roofMaterial);
                    roof.position.set(0, 0.75, 0);
                    model.add(roof);
                    
                    // 车轮
                    for (let i = -1; i <= 1; i += 2) {
                        for (let j = -1; j <= 1; j += 2) {
                            const wheelGeometry = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 16);
                            const wheelMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
                            const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                            wheel.rotation.z = Math.PI / 2;
                            wheel.position.set(i * 0.8, 0.2, j * 0.4);
                            model.add(wheel);
                        }
                    }
                    break;
                    
                case 'car2': // 跑车
                    // 车身
                    const sportBodyGeometry = new THREE.BoxGeometry(2.5, 0.3, 1);
                    const sportBodyMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff });
                    const sportBody = new THREE.Mesh(sportBodyGeometry, sportBodyMaterial);
                    sportBody.position.set(0, 0.15, 0);
                    model.add(sportBody);
                    
                    // 车顶
                    const sportRoofGeometry = new THREE.BoxGeometry(1.8, 0.2, 0.9);
                    const sportRoofMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff });
                    const sportRoof = new THREE.Mesh(sportRoofGeometry, sportRoofMaterial);
                    sportRoof.position.set(0, 0.35, 0);
                    model.add(sportRoof);
                    
                    // 车轮
                    for (let i = -1; i <= 1; i += 2) {
                        for (let j = -1; j <= 1; j += 2) {
                            const sportWheelGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.08, 16);
                            const sportWheelMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
                            const sportWheel = new THREE.Mesh(sportWheelGeometry, sportWheelMaterial);
                            sportWheel.rotation.z = Math.PI / 2;
                            sportWheel.position.set(i * 1.1, 0.15, j * 0.4);
                            model.add(sportWheel);
                        }
                    }
                    break;
                    
                case 'car3': // SUV
                    // 车身
                    const suvBodyGeometry = new THREE.BoxGeometry(2.2, 0.8, 1.2);
                    const suvBodyMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
                    const suvBody = new THREE.Mesh(suvBodyGeometry, suvBodyMaterial);
                    suvBody.position.set(0, 0.4, 0);
                    model.add(suvBody);
                    
                    // 车顶
                    const suvRoofGeometry = new THREE.BoxGeometry(2, 0.2, 1.1);
                    const suvRoofMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
                    const suvRoof = new THREE.Mesh(suvRoofGeometry, suvRoofMaterial);
                    suvRoof.position.set(0, 1.0, 0);
                    model.add(suvRoof);
                    
                    // 车轮
                    for (let i = -1; i <= 1; i += 2) {
                        for (let j = -1; j <= 1; j += 2) {
                            const suvWheelGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.12, 16);
                            const suvWheelMaterial = new THREE.MeshPhongMaterial({ color: 0x000000 });
                            const suvWheel = new THREE.Mesh(suvWheelGeometry, suvWheelMaterial);
                            suvWheel.rotation.z = Math.PI / 2;
                            suvWheel.position.set(i * 0.9, 0.3, j * 0.5);
                            model.add(suvWheel);
                        }
                    }
                    break;
            }
            
            model.position.set(0, 0, 0);
            scene.add(model);
        }
        
        // 加载用户上传的OBJ模型
        function loadUserModel(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const contents = event.target.result;
                const loader = new THREE.OBJLoader();
                
                try {
                    // 移除旧模型
                    if (model) {
                        scene.remove(model);
                    }
                    
                    model = loader.parse(contents);
                    
                    // 缩放和定位模型
                    model.scale.set(0.1, 0.1, 0.1);
                    model.position.set(0, 0, 0);
                    
                    // 添加材质
                    model.traverse(function(child) {
                        if (child.isMesh) {
                            child.material = new THREE.MeshPhongMaterial({ color: 0xffffff });
                        }
                    });
                    
                    scene.add(model);
                } catch (error) {
                    console.error('加载模型失败:', error);
                    alert('模型加载失败，请确保上传的是有效的OBJ文件');
                }
            };
            reader.readAsText(file);
        }
        
        // 更新粒子系统
        function updateWindParticles() {
            if (!windActive) return;
            
            const positions = windParticles.geometry.attributes.position.array;
            const colors = windParticles.geometry.attributes.color.array;
            
            for (let i = 0; i < positions.length; i += 3) {
                // 更新粒子位置
                positions[i] += windDirection.x * windSpeed * 0.01;
                positions[i + 1] += windDirection.y * windSpeed * 0.01;
                positions[i + 2] += windDirection.z * windSpeed * 0.01;
                
                // 粒子超出边界后重置
                if (positions[i] > 10) {
                    positions[i] = -10;
                    positions[i + 1] = -2.5 + Math.random() * 5;
                    positions[i + 2] = -2.5 + Math.random() * 5;
                }
                
                // 计算粒子速度（简化版）
                let particleSpeed = windSpeed;
                
                // 如果有模型，简单模拟气流绕流
                if (model) {
                    const particlePos = new THREE.Vector3(positions[i], positions[i + 1], positions[i + 2]);
                    const modelPos = new THREE.Vector3(0, 0, 0);
                    const distance = particlePos.distanceTo(modelPos);
                    
                    if (distance < 1.5) {
                        // 靠近模型时速度变化
                        particleSpeed *= (1 - (1.5 - distance) * 0.5);
                    }
                }
                
                // 根据速度设置颜色
                const normalizedSpeed = Math.min(particleSpeed / 20, 1);
                if (normalizedSpeed < 0.2) {
                    // 蓝色（慢）
                    colors[i] = 0.0;
                    colors[i + 1] = 0.0;
                    colors[i + 2] = 1.0;
                } else if (normalizedSpeed < 0.4) {
                    // 绿色
                    colors[i] = 0.0;
                    colors[i + 1] = 1.0;
                    colors[i + 2] = 0.5;
                } else if (normalizedSpeed < 0.6) {
                    // 黄色
                    colors[i] = 1.0;
                    colors[i + 1] = 1.0;
                    colors[i + 2] = 0.0;
                } else if (normalizedSpeed < 0.8) {
                    // 橙色
                    colors[i] = 1.0;
                    colors[i + 1] = 0.5;
                    colors[i + 2] = 0.0;
                } else {
                    // 红色（快）
                    colors[i] = 1.0;
                    colors[i + 1] = 0.0;
                    colors[i + 2] = 0.0;
                }
            }
            
            windParticles.geometry.attributes.position.needsUpdate = true;
            windParticles.geometry.attributes.color.needsUpdate = true;
        }
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            updateWindParticles();
            
            renderer.render(scene, camera);
        }
        
        // 处理窗口大小变化
        function onWindowResize() {
            camera.aspect = window.innerWidth / (window.innerHeight - 80);
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight - 80);
        }
        
        // 事件监听器
        document.addEventListener('DOMContentLoaded', function() {
            init();
            
            // 开始按钮
            document.getElementById('start-btn').addEventListener('click', function() {
                windActive = true;
                windSpeed = 10; // 初始风速
                document.getElementById('speed-info').textContent = `风速: ${windSpeed} m/s`;
            });
            
            // 停止按钮
            document.getElementById('stop-btn').addEventListener('click', function() {
                windActive = false;
                windSpeed = 0;
                document.getElementById('speed-info').textContent = `风速: ${windSpeed} m/s`;
            });
            
            // 模型选择
            document.getElementById('model-select').addEventListener('change', function(e) {
                const modelType = e.target.value;
                if (modelType !== 'none') {
                    loadBuiltInModel(modelType);
                }
            });
            
            // 文件上传
            document.getElementById('file-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    loadUserModel(file);
                }
            });
        });
    </script>
</body>
</html>
